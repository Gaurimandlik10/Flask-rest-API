apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-flaskrestapi
  labels:
    app: flaskrestapi
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: flaskrestapi
  template:
    metadata:
      labels:
        app: flaskrestapi
        release: {{ .Release.Name }}
    spec:
      {{- if .Values.initContainer.enabled }}
      initContainers:

      - name: wait-for-db
        image: busybox
        command:
        - sh
        - -c
        - |
          echo "Waiting for PostgreSQL at {{ .Values.db.host }}:{{ .Values.db.port }}..."
          until nc -z {{ .Values.db.host }} {{ .Values.db.port }}; do
            echo "PostgreSQL not ready yet... waiting 3 seconds"
            sleep 3
          done
          echo "PostgreSQL is ready! Starting migrations..."

      - name: db-migrate
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: {{ toJson .Values.initContainer.migrateCommand }}
        envFrom:
        - configMapRef:
            name: {{ .Values.configMapName }}
        - secretRef:
            name: {{ .Values.secretName }}

      {{- end }}

      containers:
      - name: flaskrestapi
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: {{ .Values.configMapName }}
        - secretRef:
            name: {{ .Values.secretName }}
        readinessProbe:
          httpGet:
            path: {{ .Values.readinessProbe.httpGet.path }}
            port: {{ .Values.readinessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
        livenessProbe:
          httpGet:
            path: {{ .Values.livenessProbe.httpGet.path }}
            port: {{ .Values.livenessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
