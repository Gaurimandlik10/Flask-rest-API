apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-flaskrestapi-svc
  labels:
    app: flaskrestapi
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: flaskrestapi
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}